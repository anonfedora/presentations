<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --black: #000000;
            --white: #F5F5F2;
            --grey-1: #1A1A1A;
            --grey-2: #2E2E2E;
            --grey-3: #666666;
            --grey-4: #A3A3A3;
            --grey-5: #D9D9D6;
            --line: rgba(245, 245, 242, 0.16);
            --line-dark: rgba(0, 0, 0, 0.14);
            --ease: cubic-bezier(.16, .8, .24, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Archivo Black';
            src: local('Archivo Black');
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: var(--white);
            color: var(--black);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--grey-3);
        }

        .mono {
            font-family: 'SF Mono', 'JetBrains Mono', 'Courier New', monospace;
            letter-spacing: 0.02em;
        }

        .display {
            font-family: 'Archivo Black', 'Arial Narrow Bold', Impact, sans-serif;
            font-weight: 900;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            line-height: 0.92;
        }

        /* ===== NAV / PROGRESS ===== */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1001;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--white);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .back-btn:hover {
            opacity: 0.8;
        }

        .download-btn {
            font-size: 12px;
            letter-spacing: 0.04em;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--white);
            color: var(--white);
            background: transparent;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .download-btn:hover {
            background: var(--white);
            color: var(--black);
        }

        .progress-rail {
            position: fixed;
            top: 48px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--grey-2);
            z-index: 1000;
        }

        .progress-fill {
            height: 100%;
            background: var(--white);
            width: 0%;
            transition: width .15s linear;
        }

        .deck-nav {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 999;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid var(--line);
            border-radius: 40px;
            padding: 10px 18px;
        }

        .nav-arrow {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .2s var(--ease), transform .2s var(--ease);
        }

        .nav-arrow:hover {
            background: var(--white);
            color: var(--black);
        }

        .nav-arrow:active {
            transform: scale(0.92);
        }

        .nav-arrow svg {
            width: 14px;
            height: 14px;
        }

        .nav-counter {
            font-size: 11px;
            letter-spacing: 0.08em;
            color: var(--grey-4);
            min-width: 52px;
            text-align: center;
        }

        .nav-counter b {
            color: var(--white);
        }

        .dots {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 998;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--grey-3);
            cursor: pointer;
            transition: all .25s var(--ease);
        }

        .dot.active {
            background: var(--white);
            height: 22px;
            border-radius: 3px;
        }

        @media (max-width:900px) {
            .dots {
                display: none;
            }
        }

        /* ===== SLIDE STRUCTURE ===== */
        .deck {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            padding-top: 50px;
        }

        .slide {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 90px 100px;
            overflow: hidden;
            background: var(--black);
            color: var(--white);
        }

        .slide.light {
            background: var(--white);
            color: var(--black);
        }

        .slide-inner {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .eyebrow {
            font-size: 28px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            font-weight: 800;
        }

        .slide.light .eyebrow {
            color: var(--grey-3);
        }

        .eyebrow::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            display: inline-block;
        }

        .slide-index {
            position: absolute;
            bottom: 40px;
            left: 100px;
            font-size: 12px;
            color: var(--grey-4);
            letter-spacing: 0.05em;
            z-index: 3;
        }

        .slide.light .slide-index {
            color: var(--grey-3);
        }

        .slide-index b {
            color: var(--white);
        }

        .slide.light .slide-index b {
            color: var(--black);
        }

        @media (max-width:900px) {
            .slide {
                height: auto;
                min-height: 100vh;
                padding: 60px 20px 100px;
                overflow: visible;
                justify-content: flex-start;
            }

            .slide-inner {
                max-width: 100%;
            }

            .slide-index {
                left: 28px;
                bottom: 24px;
            }

            /* Adjust typography for mobile */
            h1.display {
                font-size: clamp(28px, 8vw, 48px);
            }

            h2.display {
                font-size: clamp(24px, 6vw, 36px);
            }

            .lede {
                font-size: clamp(14px, 3vw, 20px);
            }
        }

        /* ===== PULSE SIGNATURE MOTIF ===== */
        .pulse-field {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .pulse-ring {
            position: absolute;
            border: 1px solid var(--line);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0.3);
            opacity: 0;
        }

        .slide.light .pulse-ring {
            border-color: var(--line-dark);
        }

        .pulse-ring.animate {
            animation: pulseOut 3.2s var(--ease) infinite;
        }

        @keyframes pulseOut {
            0% {
                transform: translate(-50%, -50%) scale(0.2);
                opacity: 0;
            }

            15% {
                opacity: 0.9;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .pulse-ring.animate {
                animation: none;
                opacity: 0.15;
                transform: translate(-50%, -50%) scale(0.6);
            }
        }

        /* ===== TYPOGRAPHY SCALE ===== */
        h1.display {
            font-size: clamp(48px, 7.2vw, 118px);
        }

        h2.display {
            font-size: clamp(34px, 5vw, 72px);
        }

        h3.display {
            font-size: clamp(22px, 2.6vw, 34px);
        }

        .lede {
            font-size: clamp(17px, 1.6vw, 26px);
            line-height: 1.55;
            color: var(--grey-5);
            max-width: 640px;
            font-weight: 400;
        }

        .slide.light .lede {
            color: var(--grey-2);
        }

        p.body-text {
            font-size: 16px;
            line-height: 1.65;
            color: var(--grey-4);
        }

        .slide.light p.body-text {
            color: var(--grey-3);
        }

        /* ===== reusable bits ===== */
        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 11px;
            letter-spacing: 0.05em;
            padding: 6px 12px;
            border: 1px solid var(--line);
            border-radius: 20px;
            color: var(--grey-4);
        }

        .slide.light .tag {
            border-color: var(--line-dark);
            color: var(--grey-3);
        }

        .divider {
            width: 100%;
            height: 1px;
            background: var(--line);
            margin: 36px 0;
        }

        .slide.light .divider {
            background: var(--line-dark);
        }

        .icon-box {
            width: 52px;
            height: 52px;
            border: 1px solid var(--line);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .slide.light .icon-box {
            border-color: var(--line-dark);
        }

        .icon-box svg {
            width: 24px;
            height: 24px;
        }

        /* ===== SLIDE TYPES ===== */

        /* Cover slide */
        .cover-logo-container {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 240px;
        }

        .cover-logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width:900px) {
            .cover-logo-container {
                position: static;
                transform: none;
                width: 100px;
                margin-bottom: 40px;
            }
        }

        .cover-headline {
            font-size: clamp(56px, 9.5vw, 148px);
            line-height: 0.88;
        }

        .cover-sub {
            margin-top: 34px;
            max-width: 680px;
        }

        .cover-meta {
            position: absolute;
            bottom: 40px;
            right: 100px;
            text-align: right;
            font-size: 11px;
            color: var(--grey-4);
            letter-spacing: 0.05em;
            z-index: 3;
        }

        @media (max-width:900px) {
            .cover-meta {
                right: 28px;
            }
        }

        /* Stat grid */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
            margin-top: 50px;
        }

        .slide.light .stat-grid {
            background: var(--line-dark);
            border-color: var(--line-dark);
        }

        .stat-cell {
            background: var(--black);
            padding: 34px 30px;
        }

        .slide.light .stat-cell {
            background: var(--white);
        }

        .stat-num {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(30px, 4vw, 52px);
            line-height: 1;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--grey-4);
            line-height: 1.4;
        }

        .slide.light .stat-label {
            color: var(--grey-3);
        }

        @media (max-width:900px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Two column */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 70px;
            margin-top: 50px;
            align-items: start;
        }

        @media (max-width:900px) {
            .two-col {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }

        .col-card {
            padding-top: 16px;
        }

        .slide.light .col-card {
            border-color: var(--line-dark);
        }

        .col-head {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }

        .col-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 22px;
            text-transform: uppercase;
        }

        .point-list {
            list-style: none;
        }

        .point-list li {
            position: relative;
            padding-left: 22px;
            margin-bottom: 14px;
            font-size: 24px;
            line-height: 1.55;
            color: var(--grey-5);
        }

        .slide.light .point-list li {
            color: var(--grey-2);
        }

        .point-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 16px;
            width: 7px;
            height: 2px;
            background: var(--grey-4);
        }

        /* Why it matters grid */
        .why-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            margin-top: 54px;
        }

        @media (max-width:900px) {
            .why-grid {
                grid-template-columns: 1fr;
                gap: 36px;
            }
        }

        .why-item .why-q {
            font-family: 'Archivo Black', sans-serif;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 16px;
            color: var(--grey-4);
            font-weight: bold;
        }

        .why-item p {
            font-size: 24px;
            line-height: 1.6;
            color: var(--grey-5);
        }

        /* Vision slide */
        .vision-slide {
            align-items: center;
            text-align: center;
        }

        .vision-text {
            font-size: clamp(38px, 6.5vw, 92px);
            line-height: 1.05;
            max-width: 1100px;
            margin: 0 auto;
        }

        .vision-text .accent-line {
            display: block;
        }

        /* Big numbers */
        .bignum-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            margin-top: 54px;
            background: var(--line);
            border: 1px solid var(--line);
        }

        .bignum-cell {
            background: var(--black);
            padding: 30px 24px;
        }

        .bignum {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(26px, 3.4vw, 44px);
            margin-bottom: 12px;
        }

        .bignum-desc {
            font-size: 18px;
            color: var(--grey-4);
            line-height: 1.5;
        }

        @media (max-width:1000px) {
            .bignum-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* TAM */
        .tam-stack {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .tam-row {
            display: grid;
            grid-template-columns: 140px 1fr 280px;
            gap: 30px;
            align-items: center;
            padding: 28px 0;
            border-top: 1px solid var(--line);
        }

        .slide.light .tam-row {
            border-color: var(--line-dark);
        }

        .tam-row:last-child {
            border-bottom: 1px solid var(--line);
        }

        .slide.light .tam-row:last-child {
            border-color: var(--line-dark);
        }

        .tam-label {
            font-family: 'Archivo Black', sans-serif;
            font-size: 20px;
        }

        .tam-bar-track {
            height: 10px;
            background: var(--grey-1);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .slide.light .tam-bar-track {
            background: var(--grey-5);
        }

        .tam-bar-fill {
            height: 100%;
            background: var(--white);
            border-radius: 6px;
            width: 0%;
            transition: width 1.4s var(--ease);
        }

        .slide.light .tam-bar-fill {
            background: var(--black);
        }

        .tam-value {
            font-size: 14px;
            text-align: right;
            color: var(--grey-4);
        }

        .slide.light .tam-value {
            color: var(--grey-3);
        }

        .tam-value b {
            color: var(--white);
            font-size: 20px;
            font-family: 'Archivo Black', sans-serif;
            display: block;
            margin-bottom: 2px;
        }

        .slide.light .tam-value b {
            color: var(--black);
        }

        @media (max-width:900px) {
            .tam-row {
                grid-template-columns: 1fr;
                gap: 10px;
                text-align: left;
            }

            .tam-value {
                text-align: left;
            }
        }

        /* Business model */
        .model-flow {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .model-card {
            flex: 1;
            min-width: 260px;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 38px 32px;
            position: relative;
        }

        .slide.light .model-card {
            border-color: var(--line-dark);
        }

        .model-card .icon-box {
            margin-bottom: 22px;
        }

        .model-card h4 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .model-card .figure {
            font-family: 'Archivo Black', sans-serif;
            font-size: 38px;
            margin: 14px 0 6px;
        }

        .model-card p {
            font-size: 18px;
            color: var(--grey-4);
            line-height: 1.5;
        }

        .slide.light .model-card p {
            color: var(--grey-3);
        }

        .model-arrow {
            flex-shrink: 0;
            opacity: 0.5;
        }

        @media (max-width:900px) {
            .model-arrow {
                transform: rotate(90deg);
            }
        }

        /* GTM */
        .phase-track {
            margin-top: 54px;
            position: relative;
        }

        .phase-row {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 30px;
            padding: 30px 0;
            border-top: 1px solid var(--line);
        }

        .slide.light .phase-row {
            border-color: var(--line-dark);
        }

        .phase-row:last-child {
            border-bottom: 1px solid var(--line);
        }

        .slide.light .phase-row:last-child {
            border-color: var(--line-dark);
        }

        .phase-num {
            font-family: 'Archivo Black', sans-serif;
            font-size: 16px;
            color: var(--grey-4);
            letter-spacing: 0.05em;
            padding-top: 4px;
        }

        .phase-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 21px;
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .phase-points {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .phase-points span {
            font-size: 18px;
            color: var(--grey-5);
            position: relative;
            padding-left: 16px;
        }

        .slide.light .phase-points span {
            color: var(--grey-2);
        }

        .phase-points span::before {
            content: '';
            position: absolute;
            left: 0;
            top: 7px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--grey-4);
        }

        .channels-row {
            margin-top: 40px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        /* Traction */
        .traction-hero {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 60px;
            margin-top: 50px;
            align-items: center;
        }

        @media (max-width:900px) {
            .traction-hero {
                grid-template-columns: 1fr;
            }
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: 30px;
            padding: 8px 16px 8px 12px;
            font-size: 16px;
            letter-spacing: 0.05em;
            margin-bottom: 30px;
        }

        .slide.light .live-badge {
            border-color: var(--line-dark);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            animation: livePulse 1.6s ease-in-out infinite;
        }

        .slide.light .live-dot {
            background: #000;
        }

        @keyframes livePulse {
            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.25;
            }
        }

        .growth-chart {
            position: relative;
            height: 240px;
            border-left: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            padding: 20px 10px 0 10px;
        }

        .slide.light .growth-chart {
            border-color: var(--line-dark);
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            height: 100%;
            gap: 18px;
            justify-content: space-around;
        }

        .bar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 1;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            max-width: 60px;
            background: linear-gradient(180deg, var(--white), var(--grey-5));
            border-radius: 4px 4px 0 0;
            height: 0%;
            transition: height 1.2s var(--ease);
        }

        .slide.light .bar {
            background: linear-gradient(180deg, var(--black), var(--grey-2));
        }

        .bar-val {
            font-family: 'Archivo Black', sans-serif;
            font-size: 16px;
        }

        .bar-cap {
            font-size: 11px;

        function buildPulseField(containerId, count, cx, cy) {
            const el = document.getElementById(containerId);
            if (!el) return;
            for (let i = 0; i < count; i++) {
                const ring = document.createElement('div');
                ring.className = 'pulse-ring animate';
                const size = 600 + i * 120;
                ring.style.width = size + 'px';
                ring.style.height = size + 'px';
                ring.style.left = cx;
                ring.style.top = cy;
                ring.style.animationDelay = (i * 0.6) + 's';
                el.appendChild(ring);
            }
        }

        function initNavigation() {
            const dotsNav = document.getElementById('dotsNav');
            dotsNav.innerHTML = '';
            slides.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'dot' + (i === 0 ? ' active' : '');
                d.addEventListener('click', () => s.scrollIntoView({ behavior: 'smooth' }));
                dotsNav.appendChild(d);
            });

            document.getElementById('prevBtn').addEventListener('click', () => {
                const target = Math.max(0, currentIndex - 1);
                slides[target].scrollIntoView({ behavior: 'smooth' });
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                const target = Math.min(slides.length - 1, currentIndex + 1);
                slides[target].scrollIntoView({ behavior: 'smooth' });
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
                    e.preventDefault();
                    slides[Math.min(slides.length - 1, currentIndex + 1)].scrollIntoView({ behavior: 'smooth' });
                } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
                    e.preventDefault();
                    slides[Math.max(0, currentIndex - 1)].scrollIntoView({ behavior: 'smooth' });
                }
            });

            deck.addEventListener('scroll', () => {
                window.requestAnimationFrame(updateUI);
            });

            // Build initial pulse fields
            buildPulseField('pulseVision', 3, '50%', '50%');
            buildPulseField('pulseRaise', 3, '92%', '15%');
            buildPulseField('pulseClosing', 3, '50%', '50%');

            // Download PDF
            document.getElementById('downloadBtn').addEventListener('click', downloadPDF);
        }

        function updateUI() {
            const scrollTop = deck.scrollTop;
            const slideHeight = deck.clientHeight;
            const idx = Math.round(scrollTop / slideHeight);
            currentIndex = Math.max(0, Math.min(slides.length - 1, idx));

            document.getElementById('curSlide').textContent = String(currentIndex + 1).padStart(2, '0');

            const dotEls = Array.from(document.getElementById('dotsNav').children);
            dotEls.forEach((d, i) => d.classList.toggle('active', i === currentIndex));

            const progress = (scrollTop) / (deck.scrollHeight - deck.clientHeight);
            document.getElementById('progressFill').style.width = (progress * 100) + '%';

            slides.forEach((s, i) => {
                if (i === currentIndex) {
                    s.querySelectorAll('.reveal').forEach(r => r.classList.add('in'));
                    animateSlideExtras(s);
                }
            });
        }

        function animateSlideExtras(slide) {
            slide.querySelectorAll('.bar[data-height]').forEach(b => {
                if (!b.dataset.done) {
                    b.style.height = b.dataset.height + '%';
                    b.dataset.done = '1';
                }
            });
            slide.querySelectorAll('.tam-bar-fill[data-width], .alloc-bar-fill[data-width]').forEach(b => {
                if (!b.dataset.done) {
                    b.style.width = b.dataset.width + '%';
                    b.dataset.done = '1';
                }
            });
            const timelineFill = slide.querySelector('#timelineFill');
            if (timelineFill && !timelineFill.dataset.done) {
                const litNode = slide.querySelector('.roadmap-node.lit');
                const grid = slide.querySelector('.roadmap-grid');
                if (litNode && grid) {
                    const isMobile = window.innerWidth <= 900;
                    if (isMobile) {
                        const trackHeight = slide.querySelector('.timeline-track').offsetHeight;
                        const nodeOffset = litNode.getBoundingClientRect().top - slide.querySelector('.timeline-track').getBoundingClientRect().top;
                        timelineFill.style.height = Math.max(nodeOffset, 0) + 'px';
                    } else {
                        const colWidth = grid.offsetWidth / grid.children.length;
                        const fillPct = (colWidth * 0.5) / grid.offsetWidth * 100;
                        timelineFill.style.width = fillPct + '%';
                    }
                    timelineFill.dataset.done = '1';
                }
            }
        }

        async function downloadPDF() {
            const deck = document.getElementById('deck');
            const originalBodyStyle = document.body.getAttribute('style') || '';
            
            // Add a temporary class for PDF generation
            document.body.classList.add('pdf-generation');
            
            // Force background colors to be preserved
            document.body.style.webkitPrintColorAdjust = 'exact';
            document.body.style.printColorAdjust = 'exact';
            
            // Temporarily adjust styles for PDF generation
            const originalDeckStyle = deck.getAttribute('style') || '';
            deck.style.overflow = 'visible';
            deck.style.height = 'auto';
            deck.style.scrollSnapType = 'none';
            deck.style.paddingTop = '0';

            // Make all slides visible, trigger animations
            slides.forEach(slide => {
                slide.querySelectorAll('.reveal').forEach(r => r.classList.add('in'));
                animateSlideExtras(slide);
                // Ensure all bars/animations are visible
                slide.querySelectorAll('.bar[data-height]').forEach(b => {
                    b.style.height = b.dataset.height + '%';
                });
                slide.querySelectorAll('.tam-bar-fill[data-width], .alloc-bar-fill[data-width]').forEach(b => {
                    b.style.width = b.dataset.width + '%';
                });
            });

            // Wait a bit for everything to render
            await new Promise(resolve => setTimeout(resolve, 1000));

            try {
                // Get jsPDF from UMD bundle
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'in',
                    format: 'a4'
                });

                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();

                // Process each slide individually
                for (let i = 0; i < slides.length; i++) {
                    const slide = slides[i];
                    
                    // Temporarily set slide size to capture correctly
                    const originalSlideStyle = slide.getAttribute('style') || '';
                    slide.style.position = 'relative';
                    slide.style.left = '0';
                    slide.style.top = '0';
                    
                    // Capture slide as canvas with explicit background color
                    const canvas = await html2canvas(slide, {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: slide.classList.contains('light') ? '#F5F5F2' : '#000000',
                        logging: false,
                        allowTaint: true
                    });

                    const imgData = canvas.toDataURL('image/jpeg', 0.98);
                    
                    // Add image to PDF
                    if (i > 0) {
                        pdf.addPage();
                    }
                    pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight);
                    
                    // Restore original slide style
                    slide.setAttribute('style', originalSlideStyle);
                }

                // Save the PDF
                pdf.save(`${currentPresentation.title}.pdf`);
            } catch (err) {
                console.error('PDF generation error:', err);
                alert('Error generating PDF. Please try again.');
            } finally {
                // Restore original styles
                document.body.classList.remove('pdf-generation');
                deck.setAttribute('style', originalDeckStyle);
                document.body.setAttribute('style', originalBodyStyle);
            }
        }

        loadPresentation();
    </script>
