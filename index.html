<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #F5F5F2;
            min-height: 100vh;
        }
        
        header {
            padding: 60px 40px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: clamp(40px, 6vw, 72px);
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 18px;
            color: #A3A3A3;
        }
        
        .presentations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding: 20px 40px 80px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .presentation-card {
            background: #1A1A1A;
            border: 1px solid rgba(245, 245, 242, 0.16);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }
        
        .presentation-card:hover {
            transform: translateY(-4px);
            border-color: rgba(245, 245, 242, 0.3);
            background: #252525;
        }
        
        .card-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .card-description {
            color: #A3A3A3;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .tag {
            font-size: 11px;
            letter-spacing: 0.05em;
            padding: 6px 12px;
            border: 1px solid rgba(245, 245, 242, 0.16);
            border-radius: 20px;
            color: #A3A3A3;
        }
        
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid rgba(245, 245, 242, 0.16);
        }
        
        .slide-count {
            font-size: 13px;
            color: #A3A3A3;
        }
        
        .view-btn {
            font-size: 13px;
            letter-spacing: 0.04em;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #F5F5F2;
            color: #F5F5F2;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }
        
        .view-btn:hover {
            background: #F5F5F2;
            color: #000;
        }
    </style>
</head>
<body>
    <header>
        <h1>Presentations</h1>
        <p class="subtitle">Browse and view your presentation decks</p>
    </header>
    
    <div class="presentations-grid" id="presentationsGrid">
        <!-- Presentations will be rendered here -->
    </div>
    
    <script>
        async function loadPresentations() {
            const response = await fetch('presentations.json');
            const presentations = await response.json();
            
            const grid = document.getElementById('presentationsGrid');
            grid.innerHTML = '';
            
            presentations.forEach(presentation => {
                const card = document.createElement('div');
                card.className = 'presentation-card';
                card.onclick = () => {
                    window.location.href = `presentation.html?id=${presentation.id}`;
                };
                
                card.innerHTML = `
                    <h2 class="card-title">${presentation.title}</h2>
                    <p class="card-description">${presentation.description}</p>
                    <div class="card-tags">
                        ${presentation.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="card-meta">
                        <span class="slide-count">${presentation.slides.length} slides</span>
                        <button class="view-btn" onclick="event.stopPropagation(); window.location.href='presentation.html?id=${presentation.id}'">View</button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        loadPresentations();
    </script>
</body>
</html>
